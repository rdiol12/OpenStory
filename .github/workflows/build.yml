name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: OpenStory-client
          path: |
            wz/OpenStory.exe
            wz/OpenStory.pdb

  launcher:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish launcher/AugurLauncher.csproj -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: GenMs-launcher
          path: launcher/bin/Release/net8.0-windows/win-x64/publish/GenMs.exe

  release:
    runs-on: ubuntu-latest
    needs: [client, launcher]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest -R ${{ github.repository }} --yes --cleanup-tag || true
          gh release create latest dist/* -R ${{ github.repository }} \
            --title "Latest build" --prerelease \
            --notes "Automated build of ${{ github.sha }}"
