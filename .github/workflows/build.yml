name: Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: OpenStory-client
          path: |
            wz/OpenStory.exe
            wz/OpenStory.pdb

  launcher:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish
        run: dotnet publish launcher/AugurLauncher.csproj -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: GenMs-launcher
          path: launcher/bin/Release/net8.0-windows/win-x64/publish/GenMs.exe
