name: iOS Build

on:
  push:
    branches: [ main, master, ios ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install cmake lz4 freetype

    - name: Setup iOS libs directory
      run: |
        mkdir -p libs/ios/include libs/ios/lib

    - name: Build lz4 for iOS
      run: |
        git clone --depth 1 https://github.com/lz4/lz4.git /tmp/lz4
        cd /tmp/lz4/lib

        xcrun --sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -c lz4.c -o lz4.o

        ar rcs liblz4.a lz4.o

        cp liblz4.a $GITHUB_WORKSPACE/libs/ios/lib/
        cp lz4.h $GITHUB_WORKSPACE/libs/ios/include/

    - name: Build FreeType for iOS
      run: |
        git clone --depth 1 -b VER-2-13-3 https://gitlab.freedesktop.org/freetype/freetype.git /tmp/freetype

        cd /tmp/freetype
        mkdir build-ios && cd build-ios

        cmake .. \
          -G Xcode \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
          -DBUILD_SHARED_LIBS=OFF \
          -DFT_DISABLE_HARFBUZZ=ON \
          -DFT_DISABLE_BROTLI=ON \
          -DFT_DISABLE_BZIP2=ON \
          -DFT_DISABLE_PNG=ON \
          -DFT_DISABLE_ZLIB=ON

        cmake --build . --config Release -- -sdk iphoneos

        find . -name "libfreetype.a" -exec cp {} $GITHUB_WORKSPACE/libs/ios/lib/ \;

        # Copy headers
        cp -r /tmp/freetype/include/* $GITHUB_WORKSPACE/libs/ios/include/
        mkdir -p $GITHUB_WORKSPACE/libs/ios/include/freetype2/freetype/config
        find . -name "ftconfig.h" -exec cp {} $GITHUB_WORKSPACE/libs/ios/include/freetype2/freetype/config/ \; 2>/dev/null || true
        find . -name "ftoption.h" -exec cp {} $GITHUB_WORKSPACE/libs/ios/include/freetype2/freetype/config/ \; 2>/dev/null || true

    - name: Build NoLifeNx for iOS
      run: |
        # Clone NoLifeNx
        git clone --depth 1 https://github.com/NoLifeDev/NoLifeNx.git /tmp/NoLifeNx

        cd /tmp/NoLifeNx

        IPHONEOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        CXX="xcrun --sdk iphoneos clang++"
        CXXFLAGS="-arch arm64 -miphoneos-version-min=14.0 -isysroot $IPHONEOS_SDK -std=c++17 -I$GITHUB_WORKSPACE/libs/ios/include"

        # Compile each source file
        $CXX $CXXFLAGS -c audio.cpp -o audio.o
        $CXX $CXXFLAGS -c bitmap.cpp -o bitmap.o
        $CXX $CXXFLAGS -c file.cpp -o file.o
        $CXX $CXXFLAGS -c node.cpp -o node.o
        $CXX $CXXFLAGS -c nx.cpp -o nx.o

        ar rcs libNoLifeNx.a audio.o bitmap.o file.o node.o nx.o

        cp libNoLifeNx.a $GITHUB_WORKSPACE/libs/ios/lib/

        # Copy headers
        mkdir -p $GITHUB_WORKSPACE/libs/ios/include/nlnx
        cp *.hpp $GITHUB_WORKSPACE/libs/ios/include/nlnx/

    - name: Setup Asio headers
      run: |
        git clone --depth 1 https://github.com/chriskohlhoff/asio.git /tmp/asio
        cp -r /tmp/asio/asio/include/* libs/ios/include/

    - name: Setup stb headers
      run: |
        mkdir -p libs/ios/include
        curl -sL https://raw.githubusercontent.com/nothings/stb/master/stb_image.h -o libs/ios/include/stb_image.h

    - name: Generate Xcode project
      run: |
        # Swap CMakeLists for iOS build (keep original backed up)
        cp CMakeLists.txt CMakeLists.desktop.txt
        cp CMakeLists.ios.cmake CMakeLists.txt

        mkdir -p build-ios && cd build-ios

        cmake .. \
          -G Xcode \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO

    - name: Build iOS app
      run: |
        cd build-ios
        cmake --build . \
          --config Release \
          -- \
          -sdk iphoneos \
          -allowProvisioningUpdates \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tail -50

    - name: Package unsigned IPA
      run: |
        # Find the .app bundle
        APP_PATH=$(find build-ios -name "*.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No .app bundle found"
          exit 1
        fi

        echo "Found app: $APP_PATH"

        # Create IPA structure: Payload/App.app
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/

        # Create unsigned IPA (zip with .ipa extension)
        zip -r OpenStory-unsigned.ipa Payload
        rm -rf Payload

        echo "Created OpenStory-unsigned.ipa"
        ls -la OpenStory-unsigned.ipa

    - name: Check build output
      if: always()
      run: |
        echo "=== Build artifacts ==="
        find build-ios -name "*.app" -type d 2>/dev/null || echo "No app bundle found"
        ls -la OpenStory-unsigned.ipa 2>/dev/null || echo "No IPA found"

        echo "=== iOS libs ==="
        ls -la libs/ios/lib/ 2>/dev/null || echo "No libs"

    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OpenStory-iOS-unsigned
        path: OpenStory-unsigned.ipa
        if-no-files-found: error
