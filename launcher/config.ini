; ======================================================================
;  GenMs Launcher configuration
;  Put this file next to GenMs.exe (the launcher), together with logo.png.
;  Paths are relative to the launcher's own folder ("." = that folder).
; ======================================================================

[paths]
; Folder that holds the .nx game-data files (Mob.nx, Map.nx, ...).
ClientDataDir    = .

; Folder that holds the client exe + its assets.
ClientInstallDir = .

; The client executable to launch when the player clicks PLAY.
ClientExe        = MapleStory.exe

[server]
DataManifestUrl   = https://72.60.176.12/updates/manifest.json
ClientManifestUrl = https://72.60.176.12/updates/client/manifest.json
; GenAI live feed shown in the launcher (rate changes, events, drop tweaks).
FeedUrl           = https://72.60.176.12/updates/feed.json
; Live GM activity feed (drives News panel + GenAI's Log). Dashboard API.
NewsUrl           = https://genms.fun/api/launcher/news
; How often the launcher re-polls the feed, in seconds.
FeedRefreshSeconds = 45
; Live server status (Online/Offline dot). The launcher TCP-probes the client's
; configured ServerIP on this port; GameHost is only used if ServerIP is unset.
GamePort           = 8484
StatusPollSeconds  = 15

[backup]
; Before an update overwrites a file, its current version is copied here into a
; timestamped folder (backups\yyyy-MM-dd_HH-mm-ss\) so you can roll back.
Dir  = backups
; How many update-backups to keep (older ones are auto-deleted). 0 = keep all.
Keep = 5
